<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Navigator SK Mawar</title>

<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;
    padding:0;

    font-family:Arial, sans-serif;

    background:#2e7d32;

}


/* HEADER */

.header{

    background:#1b5e20;

    color:white;

    text-align:center;

    padding:30px 15px;

    border-radius:0 0 35px 35px;

    box-shadow:0 5px 15px rgba(0,0,0,.3);

}


.header h1{

    margin:0;

    font-size:30px;

}


.header p{

    margin-top:10px;

    font-size:16px;

}



/* CARIAN */

.search{

    width:90%;

    max-width:600px;

    margin:25px auto;

    display:block;

    padding:15px;

    border:none;

    border-radius:30px;

    font-size:16px;

}




/* RUANG UTAMA */

.container{

    width:92%;

    max-width:800px;

    margin:auto;

}



/* TAJUK KATEGORI */

.kategori{

    background:#1b5e20;

    color:white;

    padding:12px 18px;

    margin-top:25px;

    border-radius:15px;

    font-size:20px;

    font-weight:bold;

}



/* KOTAK LOKASI */

.card{

    background:white;

    margin-top:12px;

    padding:18px;

    border-radius:20px;

    box-shadow:0 5px 15px rgba(0,0,0,.25);

}



.card a{

    text-decoration:none;

    color:#1b5e20;

    display:flex;

    align-items:center;

    font-size:19px;

    font-weight:bold;

}



.icon{

    width:50px;

    height:50px;

    background:#c8e6c9;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:27px;

    margin-right:15px;

}



footer{

    text-align:center;

    color:white;

    padding:25px;

    font-size:14px;

}



/* UNTUK TELEFON KECIL */

@media(max-width:600px){


.header h1{

font-size:24px;

}


.card a{

font-size:17px;

}


.icon{

width:45px;

height:45px;

font-size:23px;

}


}


</style>

</head>


<body>


<div class="header">

<h1>🏫 NAVIGATOR SK MAWAR</h1>

<p>Panduan Lokasi Dalam Sekolah</p>

</div>



<input 
class="search"
type="text"
placeholder="🔍 Cari lokasi..."
onkeyup="cari(this.value)">



<div class="container" id="paparan"></div>


<footer>

SK Mawar | Navigator Digital Sekolah

</footer>




<script>


const lokasi=[


["🏢 Pentadbiran","🏢","Pejabat Sekolah","lantai1_pejabat.png"],

["🏢 Pentadbiran","👨‍🏫","Bilik Guru","lantai2_bilik_guru.png"],

["🏢 Pentadbiran","📝","Bilik Mesyuarat","lantai1_bilik_mesyuarat.png"],



["📚 Akademik","💻","Bilik ICT","lantai1_bilik_ict.png"],

["📚 Akademik","📖","Bilik Pemulihan","lantai1_bilik_pemulihan.png"],

["📚 Akademik","🔬","Bilik Sains","lantai_bawah_bilik_sains.png"],

["📚 Akademik","📚","Pusat Sumber","lantai3_pusat_sumber.png"],



["🏫 Kelas","1️⃣","Tahun 1 Genius","lantai1_kelas_1_genius.png"],

["🏫 Kelas","1️⃣","Tahun 1 Intelek","lantai1_kelas_1_intelek.png"],

["🏫 Kelas","1️⃣","Tahun 1 Pintar","lantai1_kelas_1_pintar.png"],

["🏫 Kelas","3️⃣","Tahun 3 Intelek","lantai1_kelas-3_intelek.png"],

["🏫 Kelas","2️⃣","Tahun 2","lantai2_kelas_tahun_2.png"],

["🏫 Kelas","3️⃣","Tahun 3 Genius","lantai2_kelas_tahun_3_genius.png"],

["🏫 Kelas","4️⃣","Tahun 4","lantai2_kelas_tahun_4.png"],

["🏫 Kelas","5️⃣","Tahun 5","lantai2_kelas_tahun_5.png"],

["🏫 Kelas","6️⃣","Tahun 6","lantai3_tahun_6.png"],

["🏫 Kelas","6️⃣","Tahun 6 Pintar","lantai_bawah_kelas_6_pintar.png"],



["🏥 Kemudahan","🏥","Bilik Kesihatan","lantai_bawah_bilik_kesihatan.png"],

["🏥 Kemudahan","📦","Bilik SPBT","lantai_bawah_bilik_spbt.png"],

["🏥 Kemudahan","🕌","Surau","lantai_bawah_surau.png"],

["🏥 Kemudahan","🍽️","Kantin","kantin.png"]


];



function papar(data){


let html="";

let kategori="";


data.forEach(x=>{


if(kategori!=x[0]){

kategori=x[0];

html+=`

<div class="kategori">

${kategori}

</div>

`;

}


html+=`

<div class="card">

<a href="destinasi.html?gambar=${x[3]}">

<div class="icon">

${x[1]}

</div>

${x[2]}

</a>

</div>

`;

});


document.getElementById("paparan").innerHTML=html;


}



function cari(teks){


teks=teks.toLowerCase();


let hasil=lokasi.filter(x=>

x[2].toLowerCase().includes(teks)

);


papar(hasil);


}



papar(lokasi);


</script>


</body>

</html>
