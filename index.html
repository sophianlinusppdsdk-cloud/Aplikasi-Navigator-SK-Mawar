<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Navigator SK Mawar</title>


<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;

    font-family:'Segoe UI',Arial,sans-serif;

    background:#43a047;

}


/* HEADER */

header{

    background:#1b5e20;

    color:white;

    text-align:center;

    padding:30px 15px;

    border-bottom-left-radius:35px;

    border-bottom-right-radius:35px;

    box-shadow:0 5px 15px rgba(0,0,0,.3);

}


header h1{

    margin:0;

    font-size:30px;

}


header p{

    margin:10px 0 0;

}



/* SEARCH */

.search-box{

    width:90%;

    max-width:600px;

    margin:25px auto;

    display:block;

    padding:15px 20px;

    border-radius:30px;

    border:none;

    font-size:16px;

}



/* CONTAINER */

.container{

    width:90%;

    max-width:800px;

    margin:auto;

}



/* KATEGORI */

.kategori{

    background:#1b5e20;

    color:white;

    padding:12px 20px;

    border-radius:15px;

    margin-top:25px;

    font-size:20px;

    font-weight:bold;

}



/* KOTAK LOKASI */

.card{

    background:white;

    margin-top:12px;

    padding:18px;

    border-radius:20px;

    box-shadow:0 5px 15px rgba(0,0,0,.25);

}



.card a{

    text-decoration:none;

    color:#1b5e20;

    display:flex;

    align-items:center;

    font-size:19px;

    font-weight:600;

}



.icon{

    width:50px;

    height:50px;

    background:#c8e6c9;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:28px;

    margin-right:15px;

}



footer{

    text-align:center;

    color:white;

    padding:25px;

    font-size:14px;

}



</style>


</head>



<body>



<header>

<h1>🏫 NAVIGATOR SK MAWAR</h1>

<p>Panduan Lokasi Dalam Sekolah</p>

</header>



<input 
class="search-box"
type="text"
placeholder="🔍 Cari lokasi..."
onkeyup="cari(this.value)">



<div class="container" id="paparan"></div>



<footer>

SK Mawar | Navigator Digital Sekolah

</footer>

function paparkan(data){


let hasil="";

let kategori="";


data.forEach(item=>{


if(item.kategori!==kategori){

kategori=item.kategori;


hasil+=`

<div class="kategori">

${kategori}

</div>

`;

}



hasil+=`

<div class="card">

<a href="destinasi.html?gambar=${item.gambar}">

<div class="icon">

${item.ikon}

</div>


${item.nama}


</a>

</div>

`;


});


document.getElementById("paparan").innerHTML=hasil;


}



function cari(teks){


teks=teks.toLowerCase();


let hasil=lokasi.filter(x=>

x.nama.toLowerCase().includes(teks)

);


paparkan(hasil);


}



paparkan(lokasi);


</script>
