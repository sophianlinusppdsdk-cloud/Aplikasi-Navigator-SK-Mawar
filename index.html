<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Navigator SK Mawar</title>


<style>

*{
box-sizing:border-box;
}


html,body{

margin:0;
padding:0;

width:100%;

font-family:'Segoe UI',Arial,sans-serif;

background:#43a047;

overflow-x:hidden;

}


/* HEADER */

header{

background:linear-gradient(135deg,#1b5e20,#2e7d32);

color:white;

text-align:center;

padding:30px 15px;

border-bottom-left-radius:35px;

border-bottom-right-radius:35px;

box-shadow:0 5px 15px rgba(0,0,0,.3);

}


header h1{

margin:0;

font-size:30px;

}


header p{

margin:10px 0 0;

font-size:16px;

}



/* CARIAN */

.search-box{

display:block;

width:90%;

max-width:600px;

margin:25px auto;

padding:15px 20px;

border:none;

border-radius:30px;

font-size:16px;

outline:none;

}



/* KAWASAN SENARAI */

.container{

width:92%;

max-width:800px;

margin:auto;

padding-bottom:30px;

}



/* TAJUK KATEGORI */

.kategori{

background:#1b5e20;

color:white;

padding:13px 18px;

border-radius:15px;

margin-top:25px;

font-size:20px;

font-weight:bold;

box-shadow:0 3px 8px rgba(0,0,0,.2);

}



/* KOTAK LOKASI */

.card{

background:white;

margin-top:12px;

padding:18px;

border-radius:20px;

box-shadow:0 5px 15px rgba(0,0,0,.25);

transition:.2s;

}


.card:active{

transform:scale(.98);

}



.card a{

display:flex;

align-items:center;

text-decoration:none;

color:#1b5e20;

font-size:19px;

font-weight:600;

}



/* IKON */

.icon{

width:50px;

height:50px;

border-radius:50%;

background:#c8e6c9;

display:flex;

justify-content:center;

align-items:center;

font-size:28px;

margin-right:15px;

flex-shrink:0;

}



footer{

text-align:center;

color:white;

padding:25px;

font-size:14px;

}



/* TELEFON KECIL */

@media(max-width:600px){


header h1{

font-size:24px;

}


header p{

font-size:14px;

}


.card a{

font-size:17px;

}


.icon{

width:45px;

height:45px;

font-size:24px;

}


.kategori{

font-size:18px;

}


}



</style>


</head>


<body>


<header>

<h1>🏫 NAVIGATOR SK MAWAR</h1>

<p>Panduan Lokasi Dalam Sekolah</p>

</header>


<input 
class="search-box"
type="text"
placeholder="🔍 Cari lokasi..."
onkeyup="cari(this.value)">



<div class="container" id="paparan"></div>


<footer>

SK Mawar | Navigator Digital Sekolah

</footer>
