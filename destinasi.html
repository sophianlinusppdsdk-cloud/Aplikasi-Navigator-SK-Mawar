<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Navigator SK Mawar</title>

<style>

*{
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Arial,sans-serif;
    margin:0;
    background:#eef7f5;
    color:#333;
}


header{

    background:linear-gradient(135deg,#00695c,#00a896);
    color:white;
    padding:25px 15px;
    text-align:center;

    box-shadow:0 3px 10px rgba(0,0,0,.2);

}


header h1{
    margin:0;
    font-size:28px;
}

header p{
    margin:8px 0 0;
}



.container{

    padding:20px;
    max-width:800px;
    margin:auto;

}



.card{

    background:white;
    border-radius:18px;
    padding:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    margin-bottom:20px;

}



.card img{

    width:100%;
    border-radius:15px;

}



.nama{

    font-size:22px;
    font-weight:bold;
    color:#00695c;
    margin:15px 0;

}



.butang{

    display:block;
    background:#00695c;
    color:white;

    padding:15px;
    border-radius:12px;

    text-decoration:none;
    font-size:18px;

    margin-top:10px;

}


.butang:hover{

    background:#004d40;

}



footer{

    text-align:center;
    padding:20px;
    color:#666;
    font-size:14px;

}



</style>

</head>


<body>


<header>

<h1>🏫 Navigator SK Mawar</h1>

<p>Panduan Laluan Dalam Sekolah</p>

</header>



<div class="container">


<div class="card">


<div class="nama" id="tajuk"></div>


<img id="gambar" alt="Peta Laluan">


<a class="butang" href="index.html">

⬅ Kembali Ke Senarai Lokasi

</a>


</div>


</div>



<footer>

SK Mawar | Sistem Navigator Sekolah

</footer>



<script>


const data = new URLSearchParams(window.location.search);


const namaGambar = data.get("gambar");


if(namaGambar){

document.getElementById("gambar").src = namaGambar;


document.getElementById("tajuk").innerHTML =

"📍 " +

namaGambar
.replace(".png","")
.replace(/_/g," ")
.toUpperCase();


}

</script>



</body>

</html>
